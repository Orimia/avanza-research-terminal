# Streamlit base theme — dark "research terminal" palette.
# (Comprehensive CSS in src/dashboard/ui.py:inject_css layers on top of this.)
[theme]
base = "dark"
primaryColor = "#0a84ff"
backgroundColor = "#0a0a0c"
secondaryBackgroundColor = "#1c1c1e"
textColor = "#f5f5f7"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
